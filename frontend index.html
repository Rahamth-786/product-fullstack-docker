<!DOCTYPE html>
<html>
<head>
  <title>Product App</title>
</head>
<body>
  <h1>Products</h1>
  <ul id="products"></ul>

  <script>
    fetch('http://backend:5000/products')
      .then(res => res.json())
      .then(data => {
        const list = document.getElementById('products');
        data.forEach(product => {
          const li = document.createElement('li');
          li.innerText = product.name + " - ₹" + product.price;
          list.appendChild(li);
        });
      });
  </script>
</body>
</html>
